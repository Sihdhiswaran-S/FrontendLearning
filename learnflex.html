<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Flex</title>
    <style>
        .one{
            height: 200px;
            width: 400px;
            background-color: sandybrown;
            font-size: 150px;
            border: 2px solid black;
            text-align: center;
          
            
        }
        .two{
            height: 200px;
            width: 400px;
            background-color: lightblue;
            font-size: 150px;
            border: 2px solid black;
            text-align: center;
            
        }
        .three{
            height: 200px;
            width: 400px;
            background-color: lightgreen;
            font-size: 150px;
            border: 2px solid black;
            text-align: center;
            

        }
        .box1{
           margin: 10px;
           height: 1000px;
           border: 2px solid black;
           display: flex;
           flex-direction: row-reverse;
           justify-content: space-evenly;
           align-items: start;
           flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="box1">
        <div class="one">1</div>
        <div class="two">2</div>
        <div class="three">3</div>
    </div>
</body>
</html>
