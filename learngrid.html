<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>learn Grid</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: auto auto ;
            grid-template-columns: 30% 70%;
            /* grid-template-columns: 200px 800px 400px; */
            /* grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 200px); */
            gap: 10px;
            height: 600px;
            /* width: 1700px; */
        }
        .item1 {
            background-color: red;
            font-size: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* height: 200px;
            width: 200px; */
        }
        .item2 {
            background-color: blue;
            font-size: 100px;
            display: flex;
            align-items: center;
            justify-content: center;    
             /* height: 200px;
            width: 200px; */
        }
        .item3 {
            background-color: green;
            font-size: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
             /* height: 200px;
            width: 200px; */

        }
        .item4 {
            background-color: yellow;
            font-size: 100px; 
            align-items: center;
            display: flex;
            justify-content: center;
             /* height: 200px;
            width: 200px; */
        }
        .item5 {
            background-color: orange;
            font-size: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
             /* height: 200px;
            width: 200px; */
        }
        .item6 {
            background-color: rgb(248, 14, 53);
            font-size: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
             /* height: 200px;
            width: 200px; */
        }
     </style>
</head>
<body>
    <div class="container">
        <div class="item1">1</div>
        <div class="item2">2</div>
        <div class="item3">3</div>
        <div class="item4">4</div>
        <div class="item5">5</div>
        <div class="item6">6</div>
    </div>
    
</body>
</html>
